version: "3.9"

# Environnement de développement local
# Lance PostgreSQL + Redis sans l'application (qui tourne via mvnw spring-boot:run)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market360
      POSTGRES_USER: market360
      POSTGRES_PASSWORD: market360dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
