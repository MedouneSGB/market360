spring:
  application:
    name: market360
  threads:
    virtual:
      enabled: true          # Spring Boot 3.2+ — active Tomcat virtual threads

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:disabled}
      chat:
        options:
          model: claude-haiku-4-5
          max-tokens: 1024
    ollama:
      chat:
        enabled: false   # désactivé en prod — activé uniquement via profil local

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      force: true
  web:
    resources:
      static-locations: classpath:/static/
  mvc:
    static-path-pattern: /**

github:
  token: ${GITHUB_TOKEN:}    # optionnel — 5000 req/h avec, 60 req/h sans

logging:
  level:
    com.market360: DEBUG
    org.springframework.ai: INFO
